<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转页面</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        button {
            padding: 12px 16px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .checkbox input {
            margin-right: 6px;
        }

        /* 高 DPI 屏幕优化 */
        @media (min-resolution: 2dppx) {
            input, button {
                font-size: 1.1rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <input id="inputBox" type="text" placeholder="请输入内容" />
            <button onclick="parseNumber(event)">跳转！</button>
        </div>
        <label class="checkbox">
            <input type="checkbox" id="newWindow">
            打开新窗口
        </label>
        <div class="row">
            <button onclick="window.open('https://18comic.vip')">消除 502</button>
            <button onclick="document.getElementById('inputBox').value=''">清空输入</button>
        </div>
    </div>

    <script>
    function parseNumber(e) {
        const value = document.getElementById("inputBox").value.trim();

        // 正则：只允许 0-9，且至少一位
        const isNumber = /^[0-9]+$/.test(value);

        if (isNumber) {
            const len = value.length;
            const openNew = document.getElementById("newWindow").checked;
            let url = "about:blank";
          if(len < 9)url = "https://18comic.vip/album/" + encodeURIComponent(value);
          else url = "https://www.pixiv.net/artworks/" + encodeURIComponent(value);
          if(openNew)window.open(url);
          else window.location.href = url;
        } else {
            alert("内容必须为数字");
        }
    }

    // 支持按 Enter
    document.getElementById("inputBox").addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            parseNumber(e);
        }
    });
    </script>
</body>
</html>
